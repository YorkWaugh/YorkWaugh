<!DOCTYPE html>
<html lang="en-gb">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>York Waugh</title>
    <!-- Favicon -->
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        /* Custom styles */
        body {
            font-family: 'Inter', sans-serif;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* A semi-transparent overlay to ensure text is readable */
        .backdrop-blur-sm {
            -webkit-backdrop-filter: blur(4px);
            backdrop-filter: blur(4px);
        }

        /* Simple transition for links, sized using font-size for icon fonts */
        .icon-link {
            transition: transform 0.2s ease-in-out, color 0.2s ease-in-out;
            font-size: 28px;
            /* Control icon size with font-size */
            width: 36px;
            /* Ensure consistent spacing */
            height: 36px;
            /* Ensure consistent spacing */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            /* Prevent icons from shrinking */
        }

        .icon-link:hover {
            transform: scale(1.15);
        }

        /* Custom scrollbar for the icon container */
        .icon-container::-webkit-scrollbar {
            height: 4px;
        }

        .icon-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .icon-container::-webkit-scrollbar-thumb {
            background-color: #9CA3AF;
            /* gray-400 */
            border-radius: 20px;
        }

        .icon-container {
            scrollbar-width: thin;
            scrollbar-color: #9CA3AF transparent;
        }
    </style>
</head>
